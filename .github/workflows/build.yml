name: Build guide

on:
  schedule:
    - cron: '17 */12 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # ── International guides: one job per source site, run in parallel. ──
  # A failed/blocked scraper simply contributes nothing (non-fatal).
  intl:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        site:
          - pluto.tv
          - plex.tv
          - xumo.tv
          - web.magentatv.de
          - guidatv.sky.it
          - tv.sfr.fr
          - movistarplus.es
          - mi.tv
          - digea.gr
          - cosmotetv.gr
          - programtv.onet.pl
          - programetv.ro
          - tataplay.com
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install engine
        working-directory: engine
        run: npm ci
      - name: Grab ${{ matrix.site }}
        working-directory: engine
        continue-on-error: true
        run: |
          mkdir -p dist
          npm run grab -- --sites=${{ matrix.site }} --days=3 --maxConnections=15 --timeout=45000 --output=dist/${{ matrix.site }}.xml
      - name: Upload guide
        uses: actions/upload-artifact@v5
        with:
          name: part-${{ matrix.site }}
          path: engine/dist/${{ matrix.site }}.xml
          if-no-files-found: ignore
          retention-days: 1

  # ── Build final guide.xml: UK scrape + Rytec + all international guides. ──
  build:
    needs: intl
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Download international guides
        uses: actions/download-artifact@v5
        with:
          path: intl_guides
          pattern: part-*
          merge-multiple: true
      - name: List downloaded guides
        run: ls -la intl_guides || echo "no intl guides"
      - name: Build guide.xml (UK scrape + Rytec + international)
        run: python main.py
      - name: Publish guide to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Publish as a Release asset (stable URL, no git-history bloat) rather
          # than committing a ~35MB file every run. The "latest" release is
          # created once, then the asset is clobbered on each build.
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest --title "Latest EPG guide" \
              --notes "Combined XMLTV guide (UK + Rytec + international). Rebuilt every 12h. Point your EPG source at the guide.xml.gz asset."
          gh release upload latest guide.xml.gz --clobber
